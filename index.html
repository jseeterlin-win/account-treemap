function ageDays(s){const d=parseDate(s);return d?Math.max(0,Math.round((AS_OF-d)/86400000)):9999}
function ageText(d){if(d===9999)return 'No date';if(d<31)return d+'d';if(d<365)return Math.round(d/30.44)+' mo';return (d/365).toFixed(1)+' yr'}
function mix(a,b,t){const ah=a.match(/\w\w/g).map(x=>parseInt(x,16)),bh=b.match(/\w\w/g).map(x=>parseInt(x,16));return '#'+ah.map((v,i)=>Math.round(v+(bh[i]-v)*t).toString(16).padStart(2,'0')).join('')}
function recencyColor(days){if(days===9999)return '#6b7280';if(days<=182)return mix('20a35a','9ca3af',days/182);return mix('9ca3af','d64545',Math.min(1,(days-182)/(364-182)))}
function radius(s){return Math.max(4,Math.min(38,3+Math.sqrt(Math.max(0,s))/18))}
function assignRegion(lat,lng){if(lng>=-83.55)return lat>=42.55?'North Detroit':'South Detroit';if(lng<-84.75)return lat>=43.65?'North West':'South West';return 'Mid Michigan'}
async function zipPoint(zip){const key='zipgeo_'+zip,saved=localStorage.getItem(key);if(saved)return JSON.parse(saved);try{const res=await fetch('https://api.zippopotam.us/us/'+zip);if(!res.ok)throw 0;const j=await res.json(),p=j.places[0],v={lat:+p.latitude,lng:+p.longitude};localStorage.setItem(key,JSON.stringify(v));return v}catch(e){return null}}
function jitter(lat,lng,index,count){if(count<=1)return[lat,lng];const a=index*2.399963,d=.018*Math.sqrt(index+1);return[lat+Math.sin(a)*d,lng+Math.cos(a)*d/Math.cos(lat*Math.PI/180)]}
function populateFilters(){[...new Set(accounts.map(a=>a.rep).filter(Boolean))].sort().forEach(x=>rep.add(new Option(x,x)));[...new Set(accounts.map(a=>a.territory).filter(Boolean))].sort().forEach(x=>territory.add(new Option(x,x)))}
function filtered(){const q=search.value.toLowerCase().trim(),rv=rep.value,tv=territory.value,gv=region.value,min=+(minSales.value||0);return located.filter(a=>(!rv||a.rep===rv)&&(!tv||a.territory===tv)&&(!gv||a.region===gv)&&a.sales>=min&&(!q||[a.name,a.account,a.city,a.zip,a.territory,a.territoryDesc,a.rep,a.region].join(' ').toLowerCase().includes(q)))}
function popup(a){return `<div class="pop-title">${esc(a.name)}</div><div class="pop-sales">${esc(a.salesText)}</div><div class="pop-grid"><span>Account</span><b>${esc(a.account)}</b><span>Address</span><b>${esc(a.address)}, ${esc(a.city)}, MI ${esc(a.zip)}</b><span>Region</span><b>${esc(a.region)}</b><span>Sales rep</span><b>${esc(a.repNo)} – ${esc(a.rep)}</b><span>Territory</span><b>${esc(a.territory)}${a.territoryDesc?' – '+esc(a.territoryDesc):''}</b><span>Units</span><b>${esc(a.units||'—')}</b><span>Invoices</span><b>${esc(a.invoiceCount||'—')}</b><span>Last invoice</span><b>${esc(a.lastInvoice||'—')} (${ageText(a.ageDays)})</b><span>Phone</span><b>${esc(a.phone||'—')}</b></div>`}
function sortData(data){const s=sort.value;if(s==='name')return data.sort((a,b)=>a.name.localeCompare(b.name));if(s==='recent')return data.sort((a,b)=>a.ageDays-b.ageDays);if(s==='oldest')return data.sort((a,b)=>b.ageDays-a.ageDays);return data.sort((a,b)=>b.sales-a.sales)}
function render(){layer.clearLayers();markerByAccount.clear();let data=sortData(filtered()),sum=0;tbody.innerHTML='';for(const a of data){sum+=a.sales;const c=L.circleMarker([a.lat,a.lng],{radius:radius(a.sales),fillColor:recencyColor(a.ageDays),color:'#fff',weight:1.4,opacity:.95,fillOpacity:.78}).bindPopup(popup(a),{maxWidth:360}).addTo(layer);markerByAccount.set(a.account,c);const tr=document.createElement('tr');tr.innerHTML=`<td class="acct"><span class="dot" style="background:${recencyColor(a.ageDays)}"></span>${esc(a.account)}</td><td class="name">${esc(a.name)}</td><td>${esc(a.city)}</td><td>${esc(a.region)}</td><td class="num">${esc(a.salesText)}</td><td>${esc(a.lastInvoice||'—')}</td><td class="num">${ageText(a.ageDays)}</td><td>${esc(a.rep)}</td>`;tr.onclick=()=>{map.setView([a.lat,a.lng],Math.max(map.getZoom(),10));c.openPopup()};tbody.appendChild(tr)}shownCount.textContent=data.length.toLocaleString();shownSales.textContent=fmt.format(sum)}
async function init(){populateFilters();const groups={};accounts.forEach(a=>(groups[a.zip]??=[]).push(a));const entries=Object.entries(groups);let done=0;const total=entries.length;const workers=Array.from({length:12},async()=>{while(entries.length){const [zip,arr]=entries.shift(),p=await zipPoint(zip);if(p)arr.forEach((a,i)=>{const j=jitter(p.lat,p.lng,i,arr.length),regionName=assignRegion(p.lat,p.lng);located.push({...a,lat:j[0],lng:j[1],region:regionName,ageDays:ageDays(a.lastInvoice)})});done++;status.textContent=`Located ${done} of ${total} ZIP codes…`}});await Promise.all(workers);status.textContent=`Mapped ${located.length.toLocaleString()} of ${accounts.length.toLocaleString()} Michigan accounts.`;render()}
['search','minSales'].forEach(id=>document.getElementById(id).addEventListener('input',render));['rep','territory','region','sort'].forEach(id=>document.getElementById(id).addEventListener('change',render));document.querySelectorAll('.region-btn').forEach(b=>b.onclick=()=>{region.value=b.dataset.region;document.querySelectorAll('.region-btn').forEach(x=>x.classList.toggle('active',x===b));render()});region.addEventListener('change',()=>document.querySelectorAll('.region-btn').forEach(x=>x.classList.toggle('active',x.dataset.region===region.value)));init();
</script></body></html>
